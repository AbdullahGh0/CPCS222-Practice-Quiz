<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPCS222 — Interactive Practice Quiz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #0c0e14;
  --surface: #13161f;
  --surface2: #1a1e2b;
  --surface3: #222638;
  --border: #2a2f42;
  --border2: #363c52;
  --accent: #5b8dee;
  --accent-dim: rgba(91,141,238,0.12);
  --green: #3dd68c;
  --green-dim: rgba(61,214,140,0.1);
  --red: #f06a6a;
  --red-dim: rgba(240,106,106,0.1);
  --yellow: #f5a623;
  --yellow-dim: rgba(245,166,35,0.1);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.1);
  --text: #dde3f0;
  --text-dim: #7a84a0;
  --text-mid: #9da8c4;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Inter', sans-serif;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.app-logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1px;
  white-space: nowrap;
}
.app-logo span { color: var(--text-dim); font-weight: 400; }
.header-sep { flex: 1; }
.score-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 14px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}
.score-badge .score-val { color: var(--green); font-weight: 600; }

/* ── LAYOUT ── */
.app-layout { display: flex; min-height: calc(100vh - 60px); }

/* ── SIDEBAR ── */
.sidebar {
  width: 230px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  flex-shrink: 0;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}
.sidebar-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  padding: 0 20px 10px;
}
.topic-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 20px;
  background: none;
  border: none;
  color: var(--text-mid);
  font-family: var(--sans);
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.topic-btn:hover { background: var(--surface2); color: var(--text); }
.topic-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 500;
}
.topic-btn .topic-icon { font-size: 15px; }
.topic-btn .topic-check {
  margin-left: auto;
  font-size: 11px;
  color: var(--green);
  opacity: 0;
  transition: opacity 0.2s;
}
.topic-btn.done .topic-check { opacity: 1; }
.topic-btn .topic-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  margin-left: auto;
}

/* ── MAIN ── */
.main { flex: 1; padding: 32px; max-width: 820px; }

/* ── TOPIC HEADER ── */
.topic-header { margin-bottom: 28px; }
.topic-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.topic-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
.topic-desc { color: var(--text-mid); font-size: 14px; max-width: 600px; line-height: 1.6; }

/* ── PROGRESS BAR ── */
.quiz-progress { margin-bottom: 28px; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.progress-track {
  height: 4px;
  background: var(--surface3);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  border-radius: 4px;
  transition: width 0.4s ease;
}

/* ── QUESTION CARD ── */
.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
.question-card.answered-correct { border-color: rgba(61,214,140,0.3); }
.question-card.answered-wrong { border-color: rgba(240,106,106,0.3); }

.q-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.q-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}
.q-diff {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1px solid;
}
.diff-easy { color: var(--green); border-color: rgba(61,214,140,0.3); background: var(--green-dim); }
.diff-medium { color: var(--yellow); border-color: rgba(245,166,35,0.3); background: var(--yellow-dim); }
.diff-hard { color: var(--red); border-color: rgba(240,106,106,0.3); background: var(--red-dim); }
.diff-expert { color: var(--purple); border-color: rgba(167,139,250,0.3); background: var(--purple-dim); }

.q-text {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 20px;
  line-height: 1.7;
}
.q-text code {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--surface2);
  padding: 1px 6px;
  border-radius: 4px;
  color: var(--accent);
}

/* ── MCQ OPTIONS ── */
.options-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 14px;
  color: var(--text-mid);
  text-align: left;
  width: 100%;
  transition: all 0.15s;
  font-family: var(--sans);
  line-height: 1.6;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-dim);
}
.option-btn:disabled { cursor: default; }
.option-btn.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.option-btn.correct { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.option-btn.wrong { border-color: var(--red); color: var(--red); background: var(--red-dim); }
.option-btn.reveal-correct {
  border-color: rgba(61,214,140,0.5);
  color: var(--green);
  background: var(--green-dim);
}

.opt-label {
  min-width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 1px;
}
.option-btn.correct .opt-label { background: rgba(61,214,140,0.2); }
.option-btn.wrong .opt-label { background: rgba(240,106,106,0.2); }
.option-btn.selected .opt-label { background: rgba(91,141,238,0.2); }
.option-btn.reveal-correct .opt-label { background: rgba(61,214,140,0.2); }

/* ── TRUE/FALSE ── */
.tf-row { display: flex; gap: 12px; margin-bottom: 20px; }
.tf-btn {
  flex: 1;
  padding: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--sans);
  color: var(--text-mid);
  transition: all 0.15s;
}
.tf-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.tf-btn.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.tf-btn.correct { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.tf-btn.wrong { border-color: var(--red); color: var(--red); background: var(--red-dim); }

/* ── SUBMIT ── */
.submit-btn {
  padding: 12px 28px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.submit-btn:hover { background: #6d9ef0; transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.next-btn {
  padding: 12px 28px;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
  margin-left: 10px;
}
.next-btn:hover { background: var(--surface3); border-color: var(--accent); }

/* ── FEEDBACK PANEL ── */
.feedback-panel {
  margin-top: 20px;
  border-radius: 12px;
  overflow: hidden;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.feedback-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  font-weight: 600;
  font-size: 14px;
}
.feedback-correct .feedback-header { background: rgba(61,214,140,0.15); color: var(--green); }
.feedback-wrong .feedback-header { background: rgba(240,106,106,0.15); color: var(--red); }
.feedback-body {
  padding: 20px 22px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 12px 12px;
}
.feedback-section { margin-bottom: 16px; }
.feedback-section:last-child { margin-bottom: 0; }
.fb-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.fb-content { font-size: 13px; color: var(--text-mid); line-height: 1.8; }
.fb-content code {
  font-family: var(--mono);
  background: var(--surface3);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--green);
  font-size: 12px;
}
.solution-block {
  background: #0a0d14;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 14px 18px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-mid);
  line-height: 2;
  white-space: pre-wrap;
  margin-top: 8px;
}
.solution-block .step { display: block; }
.solution-block .step-ok { color: var(--green); }
.solution-block .step-note { color: var(--text-dim); font-size: 11px; }

.revise-box {
  background: rgba(245,166,35,0.06);
  border: 1px solid rgba(245,166,35,0.2);
  border-radius: 8px;
  padding: 14px 16px;
  margin-top: 8px;
}
.revise-box ul { list-style: none; padding: 0; }
.revise-box ul li {
  color: var(--text-mid);
  font-size: 13px;
  padding: 3px 0;
  display: flex;
  gap: 8px;
}
.revise-box ul li::before { content: '→'; color: var(--yellow); flex-shrink: 0; }

/* ── RESULTS SCREEN ── */
.results-screen {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  text-align: center;
  display: none;
}
.results-screen.visible { display: block; }
.results-emoji { font-size: 52px; margin-bottom: 16px; }
.results-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.results-sub { color: var(--text-mid); font-size: 15px; margin-bottom: 32px; }
.score-circle {
  width: 100px; height: 100px;
  border-radius: 50%;
  margin: 0 auto 28px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 3px solid;
  font-family: var(--mono);
}
.score-circle .sc-num { font-size: 26px; font-weight: 700; }
.score-circle .sc-label { font-size: 10px; letter-spacing: 1px; }
.score-high { border-color: var(--green); color: var(--green); }
.score-mid { border-color: var(--yellow); color: var(--yellow); }
.score-low { border-color: var(--red); color: var(--red); }

.wrong-summary { text-align: left; margin-top: 28px; }
.wrong-summary h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text-mid); }
.wrong-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 10px;
  text-align: left;
}
.wrong-item .wi-q { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.wrong-item .wi-correct { font-size: 13px; color: var(--green); margin-bottom: 6px; }
.wrong-item .wi-steps {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.9;
  white-space: pre-wrap;
  background: var(--bg);
  padding: 10px 12px;
  border-radius: 6px;
  margin: 8px 0;
}
.wi-revise {
  margin-top: 8px;
  font-size: 12px;
  color: var(--yellow);
  display: flex; gap: 6px; flex-wrap: wrap;
}
.revise-tag {
  background: rgba(245,166,35,0.1);
  border: 1px solid rgba(245,166,35,0.2);
  border-radius: 20px;
  padding: 2px 10px;
  font-family: var(--mono);
  font-size: 10px;
}

.btn-restart {
  margin-top: 28px;
  padding: 14px 32px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.2s;
}
.btn-restart:hover { background: #6d9ef0; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 80px 40px;
  color: var(--text-dim);
}
.empty-state .es-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h2 { font-size: 20px; color: var(--text-mid); margin-bottom: 8px; }

/* ── UTILITY ── */
.hidden { display: none !important; }
.btn-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.topic-panel { display: none; }
.topic-panel.active { display: block; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo">CPCS<span>-222</span> · Practice Engine</div>
  <div class="header-sep"></div>
  <div class="score-badge">Total Score: <span class="score-val" id="globalScore">0 / 0</span></div>
</div>

<div class="app-layout">

  <!-- ── SIDEBAR ── -->
  <nav class="sidebar">
    <div class="sidebar-label">Topics</div>
    <button class="topic-btn active" onclick="switchTopic('logic')" id="btn-logic">
      <span class="topic-icon">⊢</span> Logic & Predicates
      <span class="topic-num" id="num-logic"></span>
      <span class="topic-check">✓</span>
    </button>
    <button class="topic-btn" onclick="switchTopic('proofs')" id="btn-proofs">
      <span class="topic-icon">∴</span> Proofs
      <span class="topic-num" id="num-proofs"></span>
      <span class="topic-check">✓</span>
    </button>
    <button class="topic-btn" onclick="switchTopic('sets')" id="btn-sets">
      <span class="topic-icon">∈</span> Sets
      <span class="topic-num" id="num-sets"></span>
      <span class="topic-check">✓</span>
    </button>
    <button class="topic-btn" onclick="switchTopic('summations')" id="btn-summations">
      <span class="topic-icon">Σ</span> Summations
      <span class="topic-num" id="num-summations"></span>
      <span class="topic-check">✓</span>
    </button>
    <button class="topic-btn" onclick="switchTopic('functions')" id="btn-functions">
      <span class="topic-icon">f</span> Functions
      <span class="topic-num" id="num-functions"></span>
      <span class="topic-check">✓</span>
    </button>
    <button class="topic-btn" onclick="switchTopic('relations')" id="btn-relations">
      <span class="topic-icon">R</span> Relations
      <span class="topic-num" id="num-relations"></span>
      <span class="topic-check">✓</span>
    </button>
    <button class="topic-btn" onclick="switchTopic('counting')" id="btn-counting">
      <span class="topic-icon">#</span> Counting
      <span class="topic-num" id="num-counting"></span>
      <span class="topic-check">✓</span>
    </button>
    <button class="topic-btn" onclick="switchTopic('induction')" id="btn-induction">
      <span class="topic-icon">∀</span> Induction
      <span class="topic-num" id="num-induction"></span>
      <span class="topic-check">✓</span>
    </button>
  </nav>

  <!-- ── MAIN ── -->
  <main class="main" id="mainContent">
    <!-- Panels injected by JS -->
  </main>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// QUESTION BANK
// ═══════════════════════════════════════════════════════════════

const TOPICS = {

logic: {
  title: "Logic & Predicates",
  icon: "⊢",
  desc: "Truth tables, connectives, quantifiers, negation, and translation. Goes from basic propositional logic to nested quantifiers.",
  questions: [
    {
      id: "L1", diff: "easy",
      text: "What is the truth value of the implication p → q when p = False and q = False?",
      type: "mcq",
      options: ["False", "True", "Undefined", "Depends on the context"],
      correct: 1,
      solution: "Step 1: Recall the truth table for p → q.\nStep 2: p → q is only FALSE when p = True AND q = False.\nStep 3: Here p = False, so regardless of q, p → q = TRUE.\nResult: TRUE (vacuous truth — a false premise makes the implication vacuously true).",
      revise: ["Implication truth table", "Vacuous truth concept"]
    },
    {
      id: "L2", diff: "easy",
      text: "Which of the following is logically equivalent to p → q?",
      type: "mcq",
      options: ["q → p", "¬p → ¬q", "¬p ∨ q", "p ∧ ¬q"],
      correct: 2,
      solution: "Step 1: The key equivalence is p → q ≡ ¬p ∨ q.\nStep 2: Verify with a truth table row by row:\n  (T,T): p→q=T, ¬p∨q = F∨T = T ✓\n  (T,F): p→q=F, ¬p∨q = F∨F = F ✓\n  (F,T): p→q=T, ¬p∨q = T∨T = T ✓\n  (F,F): p→q=T, ¬p∨q = T∨F = T ✓\nResult: ¬p ∨ q.",
      revise: ["Implication rewrite rule: p→q ≡ ¬p∨q", "Logical equivalences table"]
    },
    {
      id: "L3", diff: "easy",
      text: "What is the contrapositive of the statement: 'If it is raining, then the ground is wet'?",
      type: "mcq",
      options: [
        "If the ground is wet, then it is raining.",
        "If it is not raining, then the ground is not wet.",
        "If the ground is not wet, then it is not raining.",
        "If it is not raining, then the ground is wet."
      ],
      correct: 2,
      solution: "Step 1: Identify p = 'It is raining', q = 'The ground is wet'.\nStep 2: The contrapositive is ¬q → ¬p.\nStep 3: ¬q = 'The ground is not wet', ¬p = 'It is not raining'.\nResult: 'If the ground is not wet, then it is not raining.'\n\nNote: Contrapositive is ALWAYS logically equivalent to the original.",
      revise: ["Contrapositive definition: ¬q → ¬p", "Difference between converse, inverse, contrapositive"]
    },
    {
      id: "L4", diff: "easy",
      text: "True or False: The converse of p → q is logically equivalent to p → q.",
      type: "tf",
      correct: false,
      solution: "FALSE.\nStep 1: The converse is q → p.\nStep 2: Check with p=T, q=F:\n  p → q = T→F = FALSE\n  q → p = F→T = TRUE\nSince they differ on this row, they are NOT equivalent.\n\nRemember: ONLY the contrapositive (¬q→¬p) is equivalent to p→q.\nThe converse and inverse are equivalent to EACH OTHER, not to the original.",
      revise: ["Converse vs contrapositive", "Truth table verification method"]
    },
    {
      id: "L5", diff: "medium",
      text: "How many rows does a truth table with 4 propositional variables have?",
      type: "mcq",
      options: ["4", "8", "12", "16"],
      correct: 3,
      solution: "Step 1: With n propositional variables, there are 2ⁿ rows.\nStep 2: n = 4, so rows = 2⁴ = 16.\nResult: 16 rows.",
      revise: ["Truth table row count formula: 2ⁿ rows for n variables"]
    },
    {
      id: "L6", diff: "medium",
      text: "Which statement correctly translates 'All CS students have a laptop' into predicate logic, where the domain is all people?",
      type: "mcq",
      options: [
        "∃x (CS(x) ∧ Laptop(x))",
        "∀x (CS(x) ∧ Laptop(x))",

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentTopic = 'logic';
let state = {};

// Init state for all topics
Object.keys(TOPICS).forEach(t => {
  state[t] = {
    currentQ: 0,
    answers: {},  // qIndex -> {selected, correct}
    submitted: {},
    finished: false
  };
});

let globalCorrect = 0, globalTotal = 0;

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

function switchTopic(topic) {
  currentTopic = topic;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + topic).classList.add('active');
  renderMain();
}

function renderMain() {
  const container = document.getElementById('mainContent');
  const topic = TOPICS[currentTopic];
  const s = state[currentTopic];
  const qs = topic.questions;

  if (s.finished) {
    container.innerHTML = renderResults();
    return;
  }

  const q = qs[s.currentQ];
  const progress = s.currentQ / qs.length;

  let html = `
    <div class="topic-header">
      <div class="topic-eyebrow">${topic.icon} · Question ${s.currentQ + 1} of ${qs.length}</div>
      <div class="topic-title">${topic.title}</div>
      <div class="topic-desc">${topic.desc}</div>
    </div>
    <div class="quiz-progress">
      <div class="progress-meta">
        <span>Progress</span>
        <span>${s.currentQ}/${qs.length} answered</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${progress*100}%"></div>
      </div>
    </div>
  `;

  html += renderQuestion(q, s.currentQ, s);
  container.innerHTML = html;
  container.scrollTop = 0;
}

function renderQuestion(q, idx, s) {
  const submitted = s.submitted[idx];
  const ans = s.answers[idx];
  const diffLabels = { easy: 'Easy', medium: 'Medium', hard: 'Hard', expert: 'Expert' };

  let html = `<div class="question-card ${submitted ? (ans && ans.correct ? 'answered-correct' : 'answered-wrong') : ''}" id="qcard">`;
  html += `<div class="q-meta">
    <span class="q-num">Q${idx + 1}</span>
    <span class="q-diff diff-${q.diff}">${diffLabels[q.diff]}</span>
  </div>`;
  html += `<div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>`;

  if (q.type === 'mcq') {
    html += `<div class="options-grid">`;
    const labels = ['A','B','C','D'];
    q.options.forEach((opt, i) => {
      let cls = 'option-btn';
      if (submitted) {
        if (i === q.correct) cls += ' reveal-correct';
        else if (ans && ans.selected === i && i !== q.correct) cls += ' wrong';
      } else if (ans && ans.selected === i) cls += ' selected';
      html += `<button class="${cls}" onclick="selectOption(${idx}, ${i})" ${submitted ? 'disabled' : ''}>
        <span class="opt-label">${labels[i]}</span>
        <span>${opt}</span>
      </button>`;
    });
    html += `</div>`;
  } else if (q.type === 'tf') {
    let tCls = 'tf-btn', fCls = 'tf-btn';
    if (submitted) {
      const correct = q.correct;
      tCls += correct === true ? ' reveal-correct' : (ans && ans.selected === true && !ans.correct ? ' wrong' : '');
      fCls += correct === false ? ' reveal-correct' : (ans && ans.selected === false && !ans.correct ? ' wrong' : '');
    } else if (ans) {
      if (ans.selected === true) tCls += ' selected';
      if (ans.selected === false) fCls += ' selected';
    }
    html += `<div class="tf-row">
      <button class="${tCls}" onclick="selectTF(${idx}, true)" ${submitted ? 'disabled' : ''}>True</button>
      <button class="${fCls}" onclick="selectTF(${idx}, false)" ${submitted ? 'disabled' : ''}>False</button>
    </div>`;
  }

  html += `<div class="btn-row">
    <button class="submit-btn" id="submitBtn" onclick="submitAnswer(${idx})" ${submitted || !s.answers[idx] ? 'disabled' : ''}>
      Check Answer
    </button>
    ${submitted ? `<button class="next-btn" onclick="nextQuestion()">${idx + 1 < TOPICS[currentTopic].questions.length ? 'Next Question →' : 'See Results →'}</button>` : ''}
  </div>`;

  if (submitted) {
    const correct = ans && ans.correct;
    html += `<div class="feedback-panel feedback-${correct ? 'correct' : 'wrong'}">
      <div class="feedback-header">
        <span>${correct ? '✓ Correct!' : '✗ Incorrect'}</span>
      </div>
      <div class="feedback-body">
        <div class="feedback-section">
          <div class="fb-label">Step-by-Step Solution</div>
          <div class="solution-block">${formatSolution(TOPICS[currentTopic].questions[idx].solution)}</div>
        </div>
        ${!correct ? `<div class="feedback-section">
          <div class="fb-label">What to Revise</div>
          <div class="revise-box">
            <ul>${TOPICS[currentTopic].questions[idx].revise.map(r => `<li>${r}</li>`).join('')}</ul>
          </div>
        </div>` : ''}
      </div>
    </div>`;
  }

  html += `</div>`;
  return html;
}

function formatSolution(sol) {
  return sol.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderResults() {
  const s = state[currentTopic];
  const qs = TOPICS[currentTopic].questions;
  let correct = 0;
  Object.values(s.answers).forEach(a => { if (a && a.correct) correct++; });
  const total = qs.length;
  const pct = Math.round(correct / total * 100);

  let scoreClass = pct >= 70 ? 'score-high' : pct >= 40 ? 'score-mid' : 'score-low';
  let emoji = pct === 100 ? '🏆' : pct >= 70 ? '✅' : pct >= 40 ? '⚠️' : '📚';
  let title = pct === 100 ? 'Perfect Score!' : pct >= 70 ? 'Good Work' : pct >= 40 ? 'Needs Practice' : 'Keep Studying';

  let wrongItems = '';
  qs.forEach((q, i) => {
    const a = s.answers[i];
    if (!a || !a.correct) {
      let yourAns = 'Not answered';
      if (a) {
        if (q.type === 'mcq') yourAns = 'Option: ' + (a.selected !== undefined ? q.options[a.selected] : '—');
        if (q.type === 'tf') yourAns = a.selected !== undefined ? (a.selected ? 'True' : 'False') : '—';
      }
      let correctAns = q.type === 'mcq' ? q.options[q.correct] : (q.correct ? 'True' : 'False');

      wrongItems += `<div class="wrong-item">
        <div class="wi-q">Q${i+1} [${q.diff.toUpperCase()}]: ${q.text.replace(/\n/g,' ').substring(0,80)}...</div>
        <div class="wi-correct">✓ Correct answer: ${correctAns}</div>
        <div style="font-size:12px;color:var(--red);margin-bottom:8px;">Your answer: ${yourAns}</div>
        <div class="wi-steps">${formatSolution(q.solution)}</div>
        <div class="wi-revise">
          Revise: ${q.revise.map(r => `<span class="revise-tag">${r}</span>`).join('')}
        </div>
      </div>`;
    }
  });

  return `<div class="results-screen visible">
    <div class="results-emoji">${emoji}</div>
    <div class="score-circle ${scoreClass}">
      <div class="sc-num">${pct}%</div>
      <div class="sc-label">${correct}/${total}</div>
    </div>
    <div class="results-title">${title}</div>
    <div class="results-sub">${TOPICS[currentTopic].title} · ${correct} correct out of ${total} questions</div>
    ${wrongItems ? `<div class="wrong-summary">
      <h3>Questions to review (${total - correct} missed):</h3>
      ${wrongItems}
    </div>` : '<p style="color:var(--green);font-size:15px;">You got everything right! Move on to the next topic.</p>'}
    <button class="btn-restart" onclick="restartTopic()">↺ Retry This Topic</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════

function selectOption(qIdx, optIdx) {
  if (state[currentTopic].submitted[qIdx]) return;
  state[currentTopic].answers[qIdx] = { selected: optIdx, correct: null };
  document.getElementById('submitBtn').disabled = false;
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === optIdx);
  });
}

function selectTF(qIdx, val) {
  if (state[currentTopic].submitted[qIdx]) return;
  state[currentTopic].answers[qIdx] = { selected: val, correct: null };
  document.getElementById('submitBtn').disabled = false;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('selected'));
  const btns = document.querySelectorAll('.tf-btn');
  if (val === true) btns[0].classList.add('selected');
  else btns[1].classList.add('selected');
}

function submitAnswer(qIdx) {
  const s = state[currentTopic];
  const q = TOPICS[currentTopic].questions[qIdx];
  const ans = s.answers[qIdx];
  if (!ans || s.submitted[qIdx]) return;

  let isCorrect = false;
  if (q.type === 'mcq') isCorrect = ans.selected === q.correct;
  if (q.type === 'tf') isCorrect = ans.selected === q.correct;

  s.answers[qIdx].correct = isCorrect;
  s.submitted[qIdx] = true;

  // Update global score
  updateGlobalScore();
  updateSidebarNums();
  renderMain();
}

function nextQuestion() {
  const s = state[currentTopic];
  const total = TOPICS[currentTopic].questions.length;
  if (s.currentQ + 1 >= total) {
    s.finished = true;
    document.getElementById('btn-' + currentTopic).classList.add('done');
  } else {
    s.currentQ++;
  }
  renderMain();
  window.scrollTo(0, 0);
}

function restartTopic() {
  state[currentTopic] = {
    currentQ: 0,
    answers: {},
    submitted: {},
    finished: false
  };
  document.getElementById('btn-' + currentTopic).classList.remove('done');
  updateGlobalScore();
  updateSidebarNums();
  renderMain();
}

function updateGlobalScore() {
  let c = 0, t = 0;
  Object.keys(state).forEach(topic => {
    Object.values(state[topic].answers).forEach(a => {
      if (a && a.correct !== null) {
        t++;
        if (a.correct) c++;
      }
    });
  });
  document.getElementById('globalScore').textContent = `${c} / ${t}`;
}

function updateSidebarNums() {
  Object.keys(TOPICS).forEach(t => {
    const s = state[t];
    const answered = Object.keys(s.submitted).length;
    const total = TOPICS[t].questions.length;
    const el = document.getElementById('num-' + t);
    if (el) el.textContent = answered > 0 ? `${answered}/${total}` : '';
  });
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
renderMain();
</script>
